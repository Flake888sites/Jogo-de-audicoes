<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relic Hunter: Leilões de Antiguidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Relic Hunter</h1>
            <div id="stats">
                <span>Saldo: <strong id="balance">R$ 0,00</strong></span>
            </div>
        </header>

        <nav>
            <button onclick="showSection('auction')">🏛️ Leilão</button>
            <button onclick="showSection('pawn')">⚖️ Loja de Penhores</button>
            <button onclick="showSection('work')">🔨 Trabalhar</button>
            <button onclick="showSection('inventory')">🎒 Inventário</button>
        </nav>

        <div id="message-bar">Bem-vindo ao mercado de antiguidades!</div>

        <main id="main-content">
            <!-- Conteúdo injetado pelo JS -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
